<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo.ai | Select</title>
  <link rel="stylesheet" href="index.css">
  <style>
    /* Specific Styles for Selection Interface */
    main {
      position: relative; z-index: 10;
      display: grid; grid-template-columns: 1fr 1fr;
      height: 100vh; padding-top: 73px;
    }
    @media (max-width: 800px) { main { grid-template-columns: 1fr; height: auto; } }

    .nav-back {
      display: flex; align-items: center; gap: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: 'Syne', sans-serif;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 9px 18px; cursor: pointer;
      border-radius: var(--radius-sm); transition: all 0.25s ease;
    }
    .nav-back:hover { border-color: var(--border-h); color: var(--text); background: rgba(255,255,255,0.04); }
    .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ── LEFT PANEL ── */
    .image-panel {
      display: flex; flex-direction: column; padding: 36px 48px;
      border-right: 1px solid var(--border); gap: 16px; overflow: hidden;
      background: linear-gradient(160deg, rgba(15,15,24,0.4) 0%, transparent 100%);
    }

    .panel-title { font-size: 2.2rem; margin-bottom: 0; }
    
    .image-frame {
      position: relative; flex: 1; min-height: 0;
      border: 1px solid var(--border); border-radius: var(--radius-md);
      overflow: hidden; background: var(--surface);
      box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
    }

    .frame-corner { position: absolute; width: 16px; height: 16px; z-index: 10; pointer-events: none; }
    .frame-corner::before, .frame-corner::after { content: ''; position: absolute; background: var(--accent); opacity: 0.6; }
    .frame-corner.tl { top: 8px; left: 8px; } .frame-corner.tl::before { top:0; left:0; width:2px; height:100%; } .frame-corner.tl::after { top:0; left:0; width:100%; height:2px; }
    .frame-corner.tr { top: 8px; right: 8px; } .frame-corner.tr::before { top:0; right:0; width:2px; height:100%; } .frame-corner.tr::after { top:0; right:0; width:100%; height:2px; }
    .frame-corner.bl { bottom: 8px; left: 8px; } .frame-corner.bl::before { bottom:0; left:0; width:2px; height:100%; } .frame-corner.bl::after { bottom:0; left:0; width:100%; height:2px; }
    .frame-corner.br { bottom: 8px; right: 8px; } .frame-corner.br::before { bottom:0; right:0; width:2px; height:100%; } .frame-corner.br::after { bottom:0; right:0; width:100%; height:2px; }

    .img-ph {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      pointer-events: none; transition: opacity 0.3s;
    }
    .img-ph-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: rgba(212, 170, 90, 0.05); border: 1px solid rgba(212, 170, 90, 0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .img-ph-icon svg { width: 28px; height: 28px; stroke: rgba(212, 170, 90, 0.4); fill: none; stroke-width: 1.5; }
    .img-ph p { font-size: 0.8rem; color: var(--muted); text-align: center; line-height: 1.6; }
    .image-frame.has-image .img-ph { opacity: 0; }

    #result-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.4s; }
    #result-img.visible { opacity: 1; }
    #bbox-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }

    .shimmer {
      position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.2s;
      background: linear-gradient(90deg, transparent 0%, rgba(212, 170, 90, 0.06) 50%, transparent 100%);
      background-size: 200% 100%; animation: shim 1.5s infinite;
    }
    .image-frame.loading .shimmer { opacity: 1; }
    @keyframes shim { from { background-position: 200% 0; } to { background-position: -200% 0; } }

    .image-footer { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .image-meta {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px; flex: 1;
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
    }
    .meta-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .meta-text { font-size: 0.75rem; color: var(--muted); flex: 1; }

    #download-btn {
      display: none; align-items: center; gap: 8px; padding: 10px 20px;
      background: rgba(212, 170, 90, 0.1); border: 1px solid rgba(212, 170, 90, 0.3);
      color: var(--accent); font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: var(--radius-sm);
      transition: all 0.2s;
    }
    #download-btn:hover { background: var(--accent); color: #000; box-shadow: 0 4px 16px rgba(212, 170, 90, 0.3); }
    #download-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    #download-btn.show { display: flex; }

    /* ── RIGHT PANEL ── */
    .select-panel {
      display: flex; flex-direction: column; padding: 36px 48px;
      background: linear-gradient(160deg, var(--surface) 0%, rgba(10,10,15,0.95) 100%);
      gap: 20px; overflow: hidden; position: relative;
    }
    .select-panel::before {
      content: ''; position: absolute; top: 0; left: 48px; right: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), transparent); opacity: 0.3;
    }

    .section-heading { font-size: 1.8rem; margin-bottom: 8px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center; gap: 16px;
      padding: 64px 24px; text-align: center; border: 1.5px dashed var(--border); border-radius: var(--radius-md);
    }
    .empty-state svg { width: 44px; height: 44px; stroke: rgba(212, 170, 90, 0.3); fill: none; }
    .empty-state p { font-size: 0.85rem; color: var(--muted); }

    .options-wrap { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; padding-right: 8px; }
    
    .opt-item {
      display: flex; align-items: center; gap: 16px; padding: 14px 20px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm);
      cursor: pointer; user-select: none; transition: all 0.2s;
      opacity: 0; transform: translateX(-10px); animation: revealOpt 0.4s forwards;
    }
    @keyframes revealOpt { to { opacity: 1; transform: translateX(0); } }
    .opt-item:hover { border-color: var(--border-h); background: rgba(255,255,255,0.05); transform: translateX(4px); }
    .opt-item.selected {
      border-color: var(--accent); background: rgba(212, 170, 90, 0.08);
      box-shadow: 0 0 0 1px rgba(212, 170, 90, 0.1), inset 0 1px 0 rgba(212, 170, 90, 0.05), 0 4px 24px rgba(212, 170, 90, 0.1);
    }
    .opt-item.disabled { pointer-events: none; opacity: 0.4 !important; }

    .opt-radio {
      width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
    }
    .opt-item.selected .opt-radio { border-color: var(--accent); box-shadow: 0 0 10px rgba(212, 170, 90, 0.4); }
    .opt-radio-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--accent);
      transform: scale(0); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    }
    .opt-item.selected .opt-radio-dot { transform: scale(1); }

    .opt-text { flex: 1; font-size: 0.95rem; font-weight: 500; color: var(--text); }
    .opt-num { font-size: 0.7rem; font-weight: 700; color: var(--muted); opacity: 0; transition: opacity 0.2s; }
    .opt-item:hover .opt-num, .opt-item.selected .opt-num { opacity: 1; }

    /* ── COLOR PICKER ── */
    #color-picker-card {
      display: none; flex-direction: column; gap: 16px; padding: 20px;
      background: rgba(212, 170, 90, 0.04); border: 1px solid rgba(212, 170, 90, 0.2);
      border-radius: var(--radius-sm); flex-shrink: 0; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      animation: revealOpt 0.3s forwards;
    }
    #color-picker-card.show { display: flex; }
    .cp-label { font-family: 'Syne', sans-serif; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
    .cp-row { display: flex; align-items: center; gap: 16px; }
    #bg-color-input {
      -webkit-appearance: none; width: 44px; height: 44px; border: 2px solid var(--border);
      border-radius: 6px; padding: 2px; background: transparent; cursor: pointer; transition: border-color 0.2s;
    }
    #bg-color-input:hover { border-color: var(--accent); }
    #bg-color-input::-webkit-color-swatch-wrapper { padding: 0; }
    #bg-color-input::-webkit-color-swatch { border: none; border-radius: 4px; }
    .cp-hex-display { flex: 1; font-size: 0.9rem; font-family: monospace; color: var(--text); letter-spacing: 0.1em; }
    .cp-presets { display: flex; gap: 8px; flex-wrap: wrap; }
    .cp-swatch { width: 24px; height: 24px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; }
    .cp-swatch:hover { transform: scale(1.15); }
    .cp-swatch.active { border-color: var(--accent); box-shadow: 0 0 12px rgba(212, 170, 90, 0.5); }

    #status-msg { font-size: 0.8rem; font-weight: 500; text-align: center; min-height: 20px; flex-shrink: 0; }

    .action-btn { background: var(--accent-g); display: flex; align-items: center; justify-content: center; gap: 12px; }
    #remove-btn { background: linear-gradient(135deg, var(--accent), #d4aa5a); color: #0a0a0f; }
    #remove-btn:hover:not(:disabled) { box-shadow: 0 8px 32px rgba(212, 170, 90, 0.4); }
    #bg-btn     { background: linear-gradient(135deg, var(--accent2), #9d8fff); color: #fff; }
    #bg-btn:hover:not(:disabled) { box-shadow: 0 8px 32px rgba(132, 94, 247, 0.4); }
    
    .action-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
    .action-btn.loading .btn-icon, .action-btn.loading .btn-text { display: none; }
    .action-btn.loading .spinner { display: block; border-color: rgba(255,255,255,0.4); border-top-color: currentColor; }

  </style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>
</div>

<nav>
  <a href="main_interface.html" class="logo">Photo<span>.ai</span></a>
  <button class="nav-back" onclick="window.location.assign('main_interface.html')">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> Back
  </button>
</nav>

<main>
  <section class="image-panel">
    <div>
      <span class="eyebrow">Result Preview</span>
      <h2 class="panel-title">Detected <em>Output.</em></h2>
    </div>

    <div class="image-frame" id="image-frame">
      <div class="frame-corner tl"></div><div class="frame-corner tr"></div>
      <div class="frame-corner bl"></div><div class="frame-corner br"></div>
      <div class="shimmer"></div>
      <div class="img-ph" id="img-ph">
        <div class="img-ph-icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div>
        <p>Your processed image<br>will appear here</p>
      </div>
      <img id="result-img" src="" alt="Result">
      <canvas id="bbox-canvas"></canvas>
    </div>

    <div class="image-footer">
      <div class="image-meta">
        <div class="meta-dot"></div>
        <span class="meta-text" id="meta-text">Awaiting selection</span>
      </div>
      <button id="download-btn" title="Download result" onclick="downloadResult()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>
  </section>

  <section class="select-panel">
    <span class="eyebrow">Step 02</span>
    <h2 class="section-heading">Choose <em>Object.</em></h2>

    <div id="options-container"></div>

    <div id="color-picker-card">
      <div class="cp-label">Background Colour</div>
      <div class="cp-row">
        <input type="color" id="bg-color-input" value="#ffffff" oninput="onColorChange(this.value)">
        <span class="cp-hex-display" id="cp-hex-display">#ffffff</span>
      </div>
      <div class="cp-presets" id="cp-presets"></div>
    </div>

    <div id="status-msg"></div>

    <button class="btn-primary action-btn" id="remove-btn" disabled onclick="submitRemove()">
      <svg class="btn-icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      <span class="btn-text">Remove Object</span>
      <div class="spinner"></div>
    </button>

    <button class="btn-primary action-btn" id="bg-btn" style="display:none" onclick="submitBgChange()">
      <svg class="btn-icon" viewBox="0 0 24 24"><circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/><circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      <span class="btn-text">Apply Colour</span>
      <div class="spinner"></div>
    </button>
  </section>
</main>

<div class="notif" id="notif"></div>

<script>
const SELECTION_API = "http://localhost:8000/apply";
const REMOVE_API    = "http://localhost:8000/remove";
const BG_API        = "http://localhost:8000/change_background";

(function persist() {
  const freshImg    = sessionStorage.getItem("uploadedImage");
  const freshLabels = sessionStorage.getItem("uploadedLabels");
  if (freshImg)    { localStorage.setItem("savedImage",  freshImg);    sessionStorage.removeItem("uploadedImage"); }
  if (freshLabels) { localStorage.setItem("savedLabels", freshLabels); sessionStorage.removeItem("uploadedLabels"); }
})();

const imageB64  = localStorage.getItem("savedImage")  || "";
const labelsRaw = localStorage.getItem("savedLabels") || "";
let selectedLabel  = null;
let resultImageB64 = null;
let selectedColor  = "#ffffff";

const PRESETS = ["#ffffff","#000000","#1a1a2e","#16213e","#0f3460","#e94560","#f5a623","#7ed321","#4a90e2","#9b59b6"];
(function buildPresets() {
  const wrap = document.getElementById("cp-presets");
  PRESETS.forEach(hex => {
    const sw = document.createElement("div");
    sw.className = "cp-swatch"; sw.style.background = hex; sw.title = hex;
    sw.addEventListener("click", () => { document.getElementById("bg-color-input").value = hex; onColorChange(hex); });
    wrap.appendChild(sw);
  });
})();

function onColorChange(hex) {
  selectedColor = hex;
  document.getElementById("cp-hex-display").textContent = hex;
  document.querySelectorAll(".cp-swatch").forEach(sw => {
    sw.classList.toggle("active", sw.title.toLowerCase() === hex.toLowerCase());
  });
}

function showImage(src, metaMsg, isResult) {
  const frame = document.getElementById("image-frame");
  const img   = document.getElementById("result-img");
  frame.classList.remove("loading"); frame.classList.add("has-image");
  img.classList.remove("visible");
  img.onload = () => img.classList.add("visible");
  img.src = src;
  document.getElementById("meta-text").textContent = metaMsg || "Image ready";
  if (isResult && src) {
    resultImageB64 = src;
    document.getElementById("download-btn").classList.add("show");
  }
}

function startLoading(msg) {
  const frame = document.getElementById("image-frame");
  const img   = document.getElementById("result-img");
  frame.classList.remove("has-image"); frame.classList.add("loading");
  img.classList.remove("visible"); img.src = "";
  clearMask();
  document.getElementById("meta-text").textContent = msg || "Processing…";
}

let _notifTimer = null;
function toast(msg, isErr) {
  const el = document.getElementById("notif");
  el.textContent = msg; el.className = "notif show" + (isErr ? " err" : "");
  clearTimeout(_notifTimer); _notifTimer = setTimeout(() => el.classList.remove("show"), 3400);
}

function setStatus(msg, color) {
  const el = document.getElementById("status-msg");
  el.textContent = msg; el.style.color = color || "var(--muted)";
}

function setAllDisabled(disabled) {
  document.querySelectorAll(".opt-item").forEach(el => el.classList.toggle("disabled", disabled));
}

function updateButtons() {
  const isBackground = selectedLabel && selectedLabel.toLowerCase() === "background";
  const isObject     = selectedLabel && !isBackground;
  const removeBtn = document.getElementById("remove-btn");
  removeBtn.style.display = isObject ? "" : "none"; removeBtn.disabled = !isObject;
  const bgBtn = document.getElementById("bg-btn");
  bgBtn.style.display = isBackground ? "" : "none"; bgBtn.disabled = !isBackground;
  document.getElementById("color-picker-card").classList.toggle("show", !!isBackground);
}

function downloadResult() {
  if (!resultImageB64) return;
  const a = document.createElement("a");
  a.href = resultImageB64; a.download = `photoai_result_${Date.now()}.jpg`; a.click();
}

function parseLabels(raw) {
  if (!raw) return [];
  let parsed; try { parsed = JSON.parse(raw); } catch { return []; }
  if (Array.isArray(parsed))      return [...new Set(parsed.map(v => String(v).trim()))];
  if (typeof parsed === "object") return [...new Set(Object.values(parsed).map(v => String(v).trim()))];
  return [];
}

function drawMask(bbox) {
  const img = document.getElementById("result-img");
  const canvas = document.getElementById("bbox-canvas");
  if (img.complete && img.naturalWidth) drawOnCanvas(canvas, img, bbox);
  else img.onload = () => drawOnCanvas(canvas, img, bbox);
}

function drawOnCanvas(canvas, img, bbox) {
  canvas.width = img.clientWidth; canvas.height = img.clientHeight;
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const scaleX = img.clientWidth / img.naturalWidth;
  const scaleY = img.clientHeight / img.naturalHeight;
  const finalScale = Math.min(scaleX, scaleY);
  const offsetX = (img.clientWidth  - img.naturalWidth  * finalScale) / 2;
  const offsetY = (img.clientHeight - img.naturalHeight * finalScale) / 2;
  const [x1, y1, x2, y2] = bbox;
  const rx = x1 * finalScale + offsetX, ry = y1 * finalScale + offsetY;
  const rw = (x2 - x1) * finalScale,    rh = (y2 - y1) * finalScale;
  ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.clearRect(rx, ry, rw, rh);
  ctx.strokeStyle = "#d4aa5a"; ctx.lineWidth = 2;
  ctx.shadowColor = "#d4aa5a"; ctx.shadowBlur = 20;
  ctx.strokeRect(rx, ry, rw, rh);
}

function clearMask() {
  const canvas = document.getElementById("bbox-canvas");
  if (canvas) canvas.getContext("2d").clearRect(0, 0, canvas.width, canvas.height);
}

let _inFlight = false;
async function submitSelection(label) {
  selectedLabel = label; updateButtons();
  if (label.toLowerCase() === "background") {
    if (imageB64) showImage("data:image/jpeg;base64," + imageB64, "Original — pick a colour");
    clearMask(); document.getElementById("download-btn").classList.remove("show");
    resultImageB64 = null; setStatus("Choose a colour and click Apply", "var(--accent2)"); return;
  }
  if (_inFlight) return; _inFlight = true; setAllDisabled(true);
  startLoading(`Detecting "${label}"…`); setStatus("Sending to backend…", "var(--accent2)");
  try {
    const res = await fetch(SELECTION_API, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ label, image: imageB64 }) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    showImage(data.image ? "data:image/jpeg;base64," + data.image : "data:image/jpeg;base64," + imageB64, `Preview: ${label}`);
    if (data.bbox) { drawMask(data.bbox); setStatus(`Detected: ${label}`, "var(--success)"); toast(`✓ "${label}" detected`); }
    else { clearMask(); setStatus(`No bbox for: ${label}`, "var(--muted)"); }
  } catch (err) {
    if (imageB64) showImage("data:image/jpeg;base64," + imageB64, "Error — showing original");
    clearMask(); setStatus("Request failed", "var(--error)"); toast("Connection error", true);
  } finally { _inFlight = false; setAllDisabled(false); updateButtons(); }
}

async function submitRemove() {
  if (!selectedLabel || selectedLabel.toLowerCase() === "background" || _inFlight) return;
  _inFlight = true; const btn = document.getElementById("remove-btn");
  btn.disabled = true; btn.classList.add("loading");
  setAllDisabled(true); startLoading(`Removing "${selectedLabel}"…`); setStatus("Processing…", "var(--accent2)");
  try {
    const res = await fetch(REMOVE_API, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ label: selectedLabel, image: imageB64 }) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.image) {
      showImage("data:image/jpeg;base64," + data.image, `Removed: ${selectedLabel}`, true);
      clearMask(); setStatus(`"${selectedLabel}" removed`, "var(--success)"); toast(`✓ "${selectedLabel}" removed`);
    } else throw new Error();
  } catch (err) {
    if (imageB64) showImage("data:image/jpeg;base64," + imageB64, "Error");
    clearMask(); setStatus("Remove failed", "var(--error)"); toast("Connection error", true);
  } finally { _inFlight = false; btn.classList.remove("loading"); setAllDisabled(false); updateButtons(); }
}

async function submitBgChange() {
  if (_inFlight) return; _inFlight = true; const btn = document.getElementById("bg-btn");
  btn.disabled = true; btn.classList.add("loading");
  setAllDisabled(true); startLoading("Replacing background…"); setStatus("Sending colour…", "var(--accent2)");
  try {
    const res = await fetch(BG_API, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ color: selectedColor, image: imageB64 }) });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.image) {
      showImage("data:image/jpeg;base64," + data.image, `Background → ${selectedColor}`, true);
      clearMask(); setStatus(`Background changed`, "var(--success)"); toast(`✓ Background replaced`);
    } else throw new Error();
  } catch (err) {
    if (imageB64) showImage("data:image/jpeg;base64," + imageB64, "Error");
    setStatus("BG change failed", "var(--error)"); toast("Connection error", true);
  } finally { _inFlight = false; btn.classList.remove("loading"); setAllDisabled(false); updateButtons(); }
}

function buildOptions(list) {
  const container = document.getElementById("options-container"); container.innerHTML = "";
  if (!list || list.length === 0) {
    container.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>No labels detected.<br>Upload an image first.</p></div>`;
    return;
  }
  const wrap = document.createElement("div"); wrap.className = "options-wrap";
  list.forEach((lbl, i) => {
    const item = document.createElement("div"); item.className = "opt-item"; item.style.animationDelay = `${i * 40}ms`;
    item.innerHTML = `<div class="opt-radio"><div class="opt-radio-dot"></div></div><span class="opt-text">${lbl}</span><span class="opt-num">#${String(i+1).padStart(2,"0")}</span>`;
    if (lbl.toLowerCase() === "background") { item.classList.add("selected"); submitSelection(lbl); }
    item.addEventListener("click", () => {
      if (_inFlight) return;
      wrap.querySelectorAll(".opt-item").forEach(el => el.classList.remove("selected"));
      item.classList.add("selected"); submitSelection(lbl);
    });
    wrap.appendChild(item);
  });
  container.appendChild(wrap);
}

if (imageB64) showImage("data:image/jpeg;base64," + imageB64, "Processed image — choose a label");
buildOptions(parseLabels(labelsRaw));

</script>
