<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo.ai | Sign In</title>
  <link rel="stylesheet" href="index.css">
  <style>
    /* Specific overrides for Sign In */
    .field-meta { display: flex; justify-content: flex-end; margin-top: 8px; }
    #message {
      margin-top: 20px; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 500;
      text-align: center; min-height: 20px; transition: color 0.2s;
    }
  </style>
</head>
<body>

  <!-- Background Orbs -->
  <div class="bg-layer">
    <div class="bg-blob bg-blob-1"></div>
    <div class="bg-blob bg-blob-2"></div>
    <div class="bg-blob bg-blob-3"></div>
    <div class="bg-grid"></div>
    <div class="bg-noise"></div>
  </div>

  <div class="auth-wrapper">
    <div class="glass-card">
      <span class="eyebrow">Welcome Back</span>
      <h1 class="mb-8">Sign <em>in.</em></h1>

      <div class="field">
        <label for="email">Work Email</label>
        <div class="input-wrap">
          <input type="email" id="email" placeholder="name@company.com" autocomplete="email">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2,4 12,13 22,4"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="field-meta">
          <a href="#" class="link" style="font-size: 0.75rem;">Forgot password?</a>
        </div>
      </div>

      <button class="btn-primary mt-4" id="sign-in-btn" onclick="sendData()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <p id="message"></p>

      <div class="divider">or</div>
      <p class="text-center" style="font-size: 0.85rem; color: var(--muted);">
        New here? <a href="register.html" class="link">Create an account</a>
      </p>
    </div>
  </div>

  <script>
    async function sendData() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const message  = document.getElementById("message");
      const btn      = document.getElementById("sign-in-btn");

      if (!email || !password) {
        message.style.color = "var(--error)"; message.innerText = "Please fill in all fields.";
        return;
      }

      btn.classList.add("loading"); btn.disabled = true; message.innerText = "";

      try {
        const response = await fetch("http://127.0.0.1:8000/signin", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const result = await response.json();

        if (response.status === 200) {
          message.style.color = "var(--success)"; message.innerText = "Signed in successfully.";
          setTimeout(() => window.location.assign("main_interface.html"), 1300);
        } else if (response.status === 404) {
          message.style.color = "var(--error)"; message.innerText = "User not found. Redirecting…";
          setTimeout(() => window.location.assign("register.html"), 1300);
        } else if (response.status === 401) {
          message.style.color = "var(--error)"; message.innerText = "Wrong Password.";
        } else {
          message.style.color = "var(--error)"; message.innerText = "Sign in failed.";
        }
      } catch (err) {
        message.style.color = "var(--error)"; message.innerText = "Network error while connecting.";
      } finally {
        btn.classList.remove("loading"); btn.disabled = false;
      }
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") sendData(); });
  </script>
</body>
</html>
